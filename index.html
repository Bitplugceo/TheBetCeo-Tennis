<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TT Engine" />
  <meta name="theme-color" content="#d4af37" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg" />
  <link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg" />
  <title>TheBetCeo Tennis</title>
  <style>
    :root {
      --bg: #efefef;
      --text: #1f2430;
      --panel: #ffffff;
      --panel-border: #dedede;
      --panel-soft: #f6f7f9;
      --panel-soft-2: #eceff3;
      --input-bg: #ffffff;
      --input-border: #cfd4da;
      --table-head: #3a404c;
      --muted: #7b8088;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      --section-toggle-text: #20242c;
      --section-toggle-icon: #d91f26;
      --table-border: #dfe2e7;
      --tracker-head-bg: #3a404c;
      --tracker-head-text: #ffffff;
    }
    body.dark-mode {
      --bg: #111;
      --text: #d4af37;
      --panel: #1a1a1a;
      --panel-border: #333;
      --panel-soft: #151515;
      --panel-soft-2: #111;
      --input-bg: #222;
      --input-border: #444;
      --table-head: #111;
      --muted: #9aa0a8;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
      --section-toggle-text: #d4af37;
      --section-toggle-icon: #d4af37;
      --table-border: #333;
      --tracker-head-bg: #111;
      --tracker-head-text: #d4af37;
    }
    button, input, select, .section, table, th, td, .fixture-day, .league-box, .tracker-panel { border-radius: 0; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Segoe UI, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    .app-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 10px 0;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: 10px;
      background: linear-gradient(90deg, #c91920 0%, #d91f26 50%, #b91520 100%);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }
    .brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
      color: #fff;
    }
    .brand-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
    }
    .theme-toggle {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: 1.5px !important;
      color: rgba(255, 255, 255, 0.85) !important;
      text-transform: uppercase !important;
      cursor: pointer !important;
      opacity: 1 !important;
    }
    .wrapper {
      max-width: 760px;
      margin: 10px auto;
      padding: 0 10px;
    }
    .section {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      margin: 8px auto;
      box-shadow: var(--shadow);
      color: var(--text);
    }
    .section-head {
      width: 100%;
      background: none !important;
      border: none;
      margin: 0 !important;
      padding: 0;
      cursor: pointer;
      color: inherit;
      text-align: inherit;
    }
    .section-head-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 16px 18px;
    }
    .section h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }
    .section-arrow {
      color: var(--section-toggle-icon);
      font-size: 13px;
      line-height: 1;
      font-weight: 900;
      transition: transform 0.2s ease;
    }
    .section.open .section-arrow { transform: rotate(90deg); }
    .section-body {
      display: none;
      padding: 0 16px 16px;
      margin-top: -4px;
    }
    .section.open .section-body { display: block; }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: var(--text);
      font-weight: 600;
    }
    h3 span, label span, small { color: var(--muted); }
    input, .league-box {
      width: 100%;
      max-width: 430px;
      box-sizing: border-box;
      display: block;
      padding: 11px 12px;
      font-size: 12px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      margin-bottom: 10px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }
    input::placeholder { color: var(--muted); opacity: 0.75; }
    input:focus, select:focus {
      outline: none;
      border-color: #4aa346;
      box-shadow: 0 0 0 2px rgba(74, 163, 70, 0.12);
    }
    button {
      padding: 8px 16px;
      margin: 6px;
      font-weight: 700;
      background: #313744;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover { opacity: 0.95; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .fetch-btn {
      background: #49a443 !important;
      color: #fff !important;
      padding: 11px 18px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      border: none !important;
      cursor: pointer;
      margin-top: 6px;
      margin-left: 0 !important;
      box-shadow: 0 2px 6px rgba(73, 164, 67, 0.2);
    }
    .fixture-toolbar {
      display: flex;
      gap: 12px;
      margin: 8px 0 12px;
      flex-wrap: wrap;
    }
    .fixture-day {
      background: #eceff3 !important;
      color: #2a2f38 !important;
      border: 1px solid #d7dbe1 !important;
      padding: 12px 22px !important;
      font-size: 12px !important;
      font-weight: 700;
      margin: 0;
      min-width: 148px !important;
      text-align: center;
    }
    .fixture-day.active {
      background: #49a443 !important;
      color: #fff !important;
      border-color: #49a443 !important;
    }
    .autofill-indicator {
      font-size: 10px;
      color: #2f8f4a;
      display: none;
    }
    #fetchStatus, #runStatus {
      font-size: 10px;
      margin-top: 6px;
      min-height: 16px;
      font-weight: 700;
    }
    #fetchStatus.ok, #runStatus.ok { color: #2f8f4a; }
    #fetchStatus.err, #runStatus.err { color: #d92d2a; }
    #fetchStatus.loading, #runStatus.loading { color: #d98a00; }
    .actions {
      text-align: center;
      padding-bottom: 20px;
    }
    #runBtn, #clearBtn {
      opacity: 1 !important;
      border: none !important;
      cursor: pointer !important;
      padding: 12px 28px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      min-width: 0 !important;
      width: auto !important;
      margin: 0 10px;
    }
    #runBtn {
      background: #3a9c35 !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(58, 156, 53, 0.35) !important;
    }
    #clearBtn {
      background: #3a404c !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2) !important;
    }
    .table-wrap {
      overflow-x: auto;
      margin: 0 10px 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 12px;
      background: var(--panel) !important;
    }
    th, td {
      border: 1px solid var(--table-border);
      padding: 8px 6px;
      text-align: center;
    }
    th {
      background: var(--table-head) !important;
      color: #fff !important;
      font-weight: 700;
    }
    td {
      background: var(--panel) !important;
      color: var(--text) !important;
      font-weight: 600 !important;
    }
    .pred-over { background: #3a9c35 !important; color: #fff !important; font-weight: 800 !important; }
    .pred-under { background: #c91920 !important; color: #fff !important; font-weight: 800 !important; }
    .pred-noplay { background: var(--panel-soft-2) !important; color: var(--muted) !important; font-weight: 700 !important; }
    .conf-a { background: #2f8f4a !important; color: #fff !important; font-weight: 800 !important; }
    .conf-b { background: #4aa346 !important; color: #fff !important; font-weight: 800 !important; }
    .conf-c { background: #d98a00 !important; color: #fff !important; font-weight: 800 !important; }
    .conf-none { background: var(--panel-soft-2) !important; color: var(--muted) !important; font-weight: 700 !important; }
    .tracker-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: flex-start;
      justify-content: flex-end;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-right: max(8px, env(safe-area-inset-right));
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      padding-left: max(8px, env(safe-area-inset-left));
      z-index: 9999;
    }
    .tracker-modal.open { display: flex; }
    .tracker-panel {
      width: min(96vw, 520px);
      height: calc(100dvh - 16px);
      max-height: calc(100dvh - 16px);
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--panel-border);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tracker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--tracker-head-bg);
      color: var(--tracker-head-text);
      border-bottom: 1px solid var(--panel-border);
      font-weight: 800;
      font-size: 13px;
    }
    .tracker-close {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      color: var(--tracker-head-text) !important;
      font-size: 18px !important;
      line-height: 1 !important;
      padding: 0 !important;
      margin: 0 !important;
      cursor: pointer !important;
    }
    .tracker-body-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px;
      background: var(--panel);
    }
    .report-empty {
      border: 1px solid var(--table-border);
      background: var(--panel-soft);
      color: var(--muted);
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 10px;
    }
    .report-card {
      border: 1px solid var(--table-border);
      background: var(--panel-soft);
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--text);
    }
    .report-title { font-size: 11px; font-weight: 900; margin-bottom: 4px; }
    .muted-mini { color: var(--muted); font-size: 10px; font-weight: 700; }
    .readonly-note { font-size: 10px; color: var(--muted); font-weight: 700; margin-top: -6px; margin-bottom: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="brand-name">TheBetCeo ⚡️</span>
    <span class="brand-right">
      <button class="theme-toggle" type="button" id="themeToggleBtn" title="Toggle dark/light mode">🎾</button>
      <button class="theme-toggle" type="button" id="reportToggleBtn" title="Open report">📊</button>
      PREDICTIONS
    </span>
  </header>

  <div class="wrapper">
    <div class="section open" id="leagueSection">
      <button class="section-head" type="button"><div class="section-head-inner"><h3>League Tier</h3><span class="section-arrow">▸</span></div></button>
      <div class="section-body">
        <label>Select Tour</label>
        <select id="tourSelect" class="league-box">
          <option value="atp">ATP - Main Tour</option>
        </select>
      </div>
    </div>

    <div class="section open" id="espnSection">
      <button class="section-head" type="button"><div class="section-head-inner"><h3>⚡ ESPN Auto-Fetch <span style="font-size:11px;color:#aaa;">(ATP only)</span></h3><span class="section-arrow">▸</span></div></button>
      <div class="section-body">
        <div id="fixtureToolbar" class="fixture-toolbar">
          <button type="button" class="fixture-day active" id="fixturesTodayBtn">Today</button>
          <button type="button" class="fixture-day" id="fixturesTomorrowBtn">Tomorrow</button>
        </div>

        <label id="fixtureSelectLabel" style="font-size:12px;">Select match</label>
        <select id="fixtureSelect" class="league-box">
          <option value="">- Select match -</option>
        </select>

        <label id="playerALabel" style="font-size:12px;">Player A Name</label>
        <input id="playerAName" placeholder="e.g. Novak Djokovic" readonly />

        <label id="playerBLabel" style="font-size:12px;margin-top:6px;">Player B Name</label>
        <input id="playerBName" placeholder="e.g. Daniil Medvedev" readonly />

        <button class="fetch-btn" id="fetchBtn" type="button">📡 Fetch Stats</button>
        <div id="fetchStatus"></div>
        <div class="readonly-note">Fixture, players, round, tournament, and history are auto-fetched from ESPN ATP match data. The line stays manual.</div>
      </div>
    </div>

    <div class="section" id="marketSection">
      <button class="section-head" type="button"><div class="section-head-inner"><h3>Market Lines</h3><span class="section-arrow">▸</span></div></button>
      <div class="section-body">
        <label id="totalMarketLabel">Full Match Total Games</label>
        <input id="totalMarket" placeholder="22.5 - 24.5" />
      </div>
    </div>

    <div class="section" id="playerASection">
      <button class="section-head" type="button"><div class="section-head-inner"><h3>Player A - Recent Totals <span class="autofill-indicator" id="aAutoTag">✅ Auto-filled</span></h3><span class="section-arrow">▸</span></div></button>
      <div class="section-body">
        <label>Last 5 Total Games <span style="font-size:10px;color:#888;">(recent → oldest)</span></label>
        <input id="aLast5Totals" placeholder="24,22,27,20,31" readonly />

        <label>Last 10 Average Total Games</label>
        <input id="aLast10Avg" placeholder="24.8" readonly />

        <label>Average Games Per Set</label>
        <input id="aGamesPerSet" placeholder="9.4" readonly />

        <label>Deciding Set Rate</label>
        <input id="aDeciderRate" placeholder="40%" readonly />
      </div>
    </div>

    <div class="section" id="playerBSection">
      <button class="section-head" type="button"><div class="section-head-inner"><h3>Player B - Recent Totals <span class="autofill-indicator" id="bAutoTag">✅ Auto-filled</span></h3><span class="section-arrow">▸</span></div></button>
      <div class="section-body">
        <label>Last 5 Total Games <span style="font-size:10px;color:#888;">(recent → oldest)</span></label>
        <input id="bLast5Totals" placeholder="23,26,21,29,22" readonly />

        <label>Last 10 Average Total Games</label>
        <input id="bLast10Avg" placeholder="23.7" readonly />

        <label>Average Games Per Set</label>
        <input id="bGamesPerSet" placeholder="9.1" readonly />

        <label>Deciding Set Rate</label>
        <input id="bDeciderRate" placeholder="30%" readonly />
      </div>
    </div>

    <div class="section" id="h2hSection">
      <button class="section-head" type="button"><div class="section-head-inner"><h3>H2H TEST <span class="autofill-indicator" id="h2hAutoTag">✅ Auto-filled (recent meetings only)</span></h3><span class="section-arrow">▸</span></div></button>
      <div class="section-body">
        <label>H2H Match Count</label>
        <input id="h2hCount" placeholder="0" readonly />

        <label>H2H Average Total Games</label>
        <input id="h2hAvgTotal" placeholder="24.1" readonly />

        <label>H2H Median Total Games</label>
        <input id="h2hMedianTotal" placeholder="24.0" readonly />

        <label>H2H Deciding Set Rate</label>
        <input id="h2hDeciderRate" placeholder="50%" readonly />
      </div>
    </div>
  </div>

  <div id="runStatus" style="max-width:760px;margin:0 auto;padding:0 12px 10px;"></div>

  <div class="actions">
    <button id="runBtn" type="button">Run</button>
    <button id="clearBtn" type="button">Clear</button>
  </div>

  <div class="table-wrap" style="max-width:760px;margin:0 auto 10px;padding:0 10px;">
    <table id="results" style="display:none;">
      <tr>
        <th>Pick</th>
        <th>Projection</th>
        <th>Edge</th>
        <th>Model Grade</th>
        <th>Prediction</th>
      </tr>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

  <div id="trackerModal" class="tracker-modal" aria-hidden="true">
    <div class="tracker-panel">
      <div class="tracker-head">
        <span>Engine Report</span>
        <button class="tracker-close" id="trackerCloseBtn" type="button">✕</button>
      </div>
      <div class="tracker-body-scroll">
        <div id="reportHistory"></div>
      </div>
    </div>
  </div>

  <script>
    const SCOREBOARD_BASE = "https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard";
    const DAY_CACHE_KEY = "tt_day_cache_v2";
    const RUN_LOG_KEY = "tt_run_log_v2";
    const PROFILE_CACHE_KEY = "tt_profile_cache_v2";
    const LOOKBACK_DAYS = 120;

    const state = {
      selectedDate: null,
      fixtures: [],
      selectedMatch: null,
      fetchedAnalysis: null,
      dayCache: loadJson(DAY_CACHE_KEY, {}),
      runLog: loadJson(RUN_LOG_KEY, []),
      profileCache: loadJson(PROFILE_CACHE_KEY, {})
    };

    const els = {
      themeToggleBtn: document.getElementById('themeToggleBtn'),
      reportToggleBtn: document.getElementById('reportToggleBtn'),
      trackerModal: document.getElementById('trackerModal'),
      trackerCloseBtn: document.getElementById('trackerCloseBtn'),
      fixturesTodayBtn: document.getElementById('fixturesTodayBtn'),
      fixturesTomorrowBtn: document.getElementById('fixturesTomorrowBtn'),
      fixtureSelect: document.getElementById('fixtureSelect'),
      playerAName: document.getElementById('playerAName'),
      playerBName: document.getElementById('playerBName'),
      fetchBtn: document.getElementById('fetchBtn'),
      fetchStatus: document.getElementById('fetchStatus'),
      totalMarket: document.getElementById('totalMarket'),
      aLast5Totals: document.getElementById('aLast5Totals'),
      aLast10Avg: document.getElementById('aLast10Avg'),
      aGamesPerSet: document.getElementById('aGamesPerSet'),
      aDeciderRate: document.getElementById('aDeciderRate'),
      bLast5Totals: document.getElementById('bLast5Totals'),
      bLast10Avg: document.getElementById('bLast10Avg'),
      bGamesPerSet: document.getElementById('bGamesPerSet'),
      bDeciderRate: document.getElementById('bDeciderRate'),
      h2hCount: document.getElementById('h2hCount'),
      h2hAvgTotal: document.getElementById('h2hAvgTotal'),
      h2hMedianTotal: document.getElementById('h2hMedianTotal'),
      h2hDeciderRate: document.getElementById('h2hDeciderRate'),
      aAutoTag: document.getElementById('aAutoTag'),
      bAutoTag: document.getElementById('bAutoTag'),
      h2hAutoTag: document.getElementById('h2hAutoTag'),
      runBtn: document.getElementById('runBtn'),
      clearBtn: document.getElementById('clearBtn'),
      runStatus: document.getElementById('runStatus'),
      results: document.getElementById('results'),
      resultsBody: document.getElementById('resultsBody'),
      reportHistory: document.getElementById('reportHistory')
    };

    setupTheme();
    setupSections();
    setupModal();
    setupActions();
    init();

    function init() {
      const today = toDateInputValue(new Date());
      state.selectedDate = today;
      fetchFixturesForDate(today);
      renderReport();
    }

    function setupTheme() {
      const key = 'tt_theme_v2';
      const saved = localStorage.getItem(key);
      if (saved === 'dark') document.body.classList.add('dark-mode');
      els.themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem(key, document.body.classList.contains('dark-mode') ? 'dark' : 'light');
      });
    }

    function setupSections() {
      document.querySelectorAll('.section').forEach(section => {
        const btn = section.querySelector('.section-head');
        btn.addEventListener('click', () => section.classList.toggle('open'));
      });
    }

    function setupModal() {
      els.reportToggleBtn.addEventListener('click', () => {
        els.trackerModal.classList.add('open');
        renderReport();
      });
      els.trackerCloseBtn.addEventListener('click', () => els.trackerModal.classList.remove('open'));
      els.trackerModal.addEventListener('click', e => {
        if (e.target === els.trackerModal) els.trackerModal.classList.remove('open');
      });
    }

    function setupActions() {
      els.fixturesTodayBtn.addEventListener('click', () => {
        setDayButtons('today');
        fetchFixturesForDate(toDateInputValue(new Date()));
      });
      els.fixturesTomorrowBtn.addEventListener('click', () => {
        const d = new Date();
        d.setDate(d.getDate() + 1);
        setDayButtons('tomorrow');
        fetchFixturesForDate(toDateInputValue(d));
      });
      els.fixtureSelect.addEventListener('change', onFixtureChange);
      els.fetchBtn.addEventListener('click', fetchStatsForSelectedMatch);
      els.runBtn.addEventListener('click', runEngine);
      els.clearBtn.addEventListener('click', clearAll);
    }

    function setDayButtons(which) {
      els.fixturesTodayBtn.classList.toggle('active', which === 'today');
      els.fixturesTomorrowBtn.classList.toggle('active', which === 'tomorrow');
    }

    async function fetchFixturesForDate(dateValue, forceRefresh = false) {
      state.selectedDate = dateValue;
      setStatus(els.fetchStatus, 'Loading ATP fixtures…', 'loading');
      els.fetchBtn.disabled = true;
      try {
        const matches = await getMatchesForDate(dateValue, forceRefresh);
        const scheduled = matches.filter(m => !m.completed);
        state.fixtures = scheduled.length ? scheduled : matches;
        renderFixtureSelect();
        setStatus(els.fetchStatus, state.fixtures.length ? `Loaded ${state.fixtures.length} match${state.fixtures.length === 1 ? '' : 'es'} for ${dateValue}.` : `No ATP matches found for ${dateValue}.`, state.fixtures.length ? 'ok' : 'err');
      } catch (err) {
        setStatus(els.fetchStatus, `Fixture fetch failed: ${err.message}`, 'err');
      } finally {
        els.fetchBtn.disabled = false;
      }
    }

    function renderFixtureSelect() {
      els.fixtureSelect.innerHTML = '<option value="">- Select match -</option>';
      state.fixtures.forEach(match => {
        const opt = document.createElement('option');
        opt.value = match.id;
        opt.textContent = `${match.playerA.name} vs ${match.playerB.name} · ${match.tournament || 'ATP'} · ${match.round || 'Round'}`;
        els.fixtureSelect.appendChild(opt);
      });
      state.selectedMatch = null;
      els.playerAName.value = '';
      els.playerBName.value = '';
      clearProfileFields();
    }

    function onFixtureChange() {
      const id = els.fixtureSelect.value;
      state.selectedMatch = state.fixtures.find(m => m.id === id) || null;
      if (!state.selectedMatch) {
        els.playerAName.value = '';
        els.playerBName.value = '';
        return;
      }
      els.playerAName.value = state.selectedMatch.playerA.name;
      els.playerBName.value = state.selectedMatch.playerB.name;
      state.fetchedAnalysis = null;
      clearProfileFields();
      setStatus(els.fetchStatus, 'Fixture selected. Tap Fetch Stats to build recent totals and H2H profile.', 'ok');
    }

    async function fetchStatsForSelectedMatch() {
      if (!state.selectedMatch) {
        setStatus(els.fetchStatus, 'Select a match first.', 'err');
        return;
      }
      const cacheKey = `${state.selectedMatch.id}_${state.selectedDate}`;
      if (state.profileCache[cacheKey]) {
        state.fetchedAnalysis = state.profileCache[cacheKey];
        applyAnalysisToFields(state.fetchedAnalysis);
        setStatus(els.fetchStatus, 'Stats loaded from cache.', 'ok');
        return;
      }
      setStatus(els.fetchStatus, 'Scanning ESPN history for both players…', 'loading');
      els.fetchBtn.disabled = true;
      try {
        const bundle = await collectHistoryBundle(state.selectedMatch, LOOKBACK_DAYS);
        const analysis = analyzeProfilesOnly(state.selectedMatch, bundle);
        state.fetchedAnalysis = analysis;
        state.profileCache[cacheKey] = analysis;
        localStorage.setItem(PROFILE_CACHE_KEY, JSON.stringify(state.profileCache));
        applyAnalysisToFields(analysis);
        const enough = analysis.aProfile.count >= 4 && analysis.bProfile.count >= 4;
        setStatus(els.fetchStatus, enough ? `Stats fetched. Scanned ${bundle.scannedDays} day blocks.` : `Stats fetched, but sample is still thin. Scanned ${bundle.scannedDays} day blocks.`, enough ? 'ok' : 'err');
      } catch (err) {
        setStatus(els.fetchStatus, `Fetch stats failed: ${err.message}`, 'err');
      } finally {
        els.fetchBtn.disabled = false;
      }
    }

    function applyAnalysisToFields(analysis) {
      const a = analysis.aProfile;
      const b = analysis.bProfile;
      const h = analysis.h2hProfile;
      els.aLast5Totals.value = a.totals.slice(0, 5).join(',');
      els.aLast10Avg.value = a.count ? round1(a.last10Avg).toFixed(1) : '';
      els.aGamesPerSet.value = a.count ? round1(a.avgGamesPerSet).toFixed(1) : '';
      els.aDeciderRate.value = a.count ? pct(a.deciderRate) : '';
      els.bLast5Totals.value = b.totals.slice(0, 5).join(',');
      els.bLast10Avg.value = b.count ? round1(b.last10Avg).toFixed(1) : '';
      els.bGamesPerSet.value = b.count ? round1(b.avgGamesPerSet).toFixed(1) : '';
      els.bDeciderRate.value = b.count ? pct(b.deciderRate) : '';
      els.h2hCount.value = String(h.count || 0);
      els.h2hAvgTotal.value = h.count ? round1(h.avgTotalGames).toFixed(1) : '';
      els.h2hMedianTotal.value = h.count ? round1(h.median).toFixed(1) : '';
      els.h2hDeciderRate.value = h.count ? pct(h.deciderRate) : '';
      els.aAutoTag.style.display = a.count ? 'inline' : 'none';
      els.bAutoTag.style.display = b.count ? 'inline' : 'none';
      els.h2hAutoTag.style.display = h.count ? 'inline' : 'none';
    }

    function clearProfileFields() {
      [els.aLast5Totals, els.aLast10Avg, els.aGamesPerSet, els.aDeciderRate, els.bLast5Totals, els.bLast10Avg, els.bGamesPerSet, els.bDeciderRate, els.h2hCount, els.h2hAvgTotal, els.h2hMedianTotal, els.h2hDeciderRate].forEach(el => el.value = '');
      els.aAutoTag.style.display = 'none';
      els.bAutoTag.style.display = 'none';
      els.h2hAutoTag.style.display = 'none';
    }

    async function runEngine() {
      if (!state.selectedMatch) {
        setStatus(els.runStatus, 'Select a match first.', 'err');
        return;
      }
      if (!state.fetchedAnalysis) {
        setStatus(els.runStatus, 'Fetch stats first so the engine has something besides hope.', 'err');
        return;
      }
      const line = parseFloat(String(els.totalMarket.value || '').trim());
      if (!Number.isFinite(line)) {
        setStatus(els.runStatus, 'Enter a valid full match total games line first.', 'err');
        return;
      }
      const analysis = finalizePrediction(state.selectedMatch, line, state.fetchedAnalysis);
      renderResult(analysis);
      persistRun(analysis);
      renderReport();
      setStatus(els.runStatus, analysis.statusText, analysis.statusClass);
    }

    function clearAll() {
      els.fixtureSelect.value = '';
      state.selectedMatch = null;
      state.fetchedAnalysis = null;
      els.playerAName.value = '';
      els.playerBName.value = '';
      els.totalMarket.value = '';
      clearProfileFields();
      els.results.style.display = 'none';
      els.resultsBody.innerHTML = '';
      setStatus(els.fetchStatus, '', '');
      setStatus(els.runStatus, '', '');
    }

    async function collectHistoryBundle(match, lookbackDays) {
      const anchorDate = new Date(match.date || state.selectedDate);
      anchorDate.setHours(0, 0, 0, 0);
      const targetA = match.playerA.id;
      const targetB = match.playerB.id;
      const historyA = [];
      const historyB = [];
      const h2h = [];
      let scanned = 0;
      const seenA = new Set();
      const seenB = new Set();
      const seenH2H = new Set();

      for (let offset = 1; offset <= lookbackDays; offset += 4) {
        const dates = [];
        for (let step = 0; step < 4 && (offset + step) <= lookbackDays; step++) {
          const d = new Date(anchorDate);
          d.setDate(anchorDate.getDate() - (offset + step));
          dates.push(toDateInputValue(d));
        }
        const results = await Promise.all(dates.map(date => getMatchesForDate(date, false)));
        for (const dayMatches of results) {
          scanned += 1;
          for (const m of dayMatches) {
            if (!isUsableCompletedMatch(m) || m.id === match.id) continue;
            const involvesA = [m.playerA.id, m.playerB.id].includes(targetA);
            const involvesB = [m.playerA.id, m.playerB.id].includes(targetB);
            if (involvesA && !seenA.has(m.id) && historyA.length < 12) { historyA.push(m); seenA.add(m.id); }
            if (involvesB && !seenB.has(m.id) && historyB.length < 12) { historyB.push(m); seenB.add(m.id); }
            if (involvesA && involvesB && !seenH2H.has(m.id) && h2h.length < 8) { h2h.push(m); seenH2H.add(m.id); }
          }
        }
        if (historyA.length >= 10 && historyB.length >= 10 && scanned >= 16) break;
      }

      historyA.sort((a, b) => new Date(b.date) - new Date(a.date));
      historyB.sort((a, b) => new Date(b.date) - new Date(a.date));
      h2h.sort((a, b) => new Date(b.date) - new Date(a.date));
      return { scannedDays: scanned, playerAHistory: historyA, playerBHistory: historyB, h2hHistory: h2h };
    }

    function analyzeProfilesOnly(match, bundle) {
      return {
        match,
        bundle,
        aProfile: buildPlayerProfile(match.playerA.id, bundle.playerAHistory),
        bProfile: buildPlayerProfile(match.playerB.id, bundle.playerBHistory),
        h2hProfile: buildH2HProfile(match.playerA.id, match.playerB.id, bundle.h2hHistory)
      };
    }

    function finalizePrediction(match, line, base) {
      const aProfile = base.aProfile;
      const bProfile = base.bProfile;
      const h2hProfile = base.h2hProfile;
      const enough = aProfile.count >= 4 && bProfile.count >= 4;
      if (!enough) {
        return {
          match, line, projection: null, edge: null, pick: 'No Play', confidence: 'NO PLAY',
          statusClass: 'err', statusText: 'No play. Not enough usable recent ATP history for one or both players.',
          reason: 'The sample is too thin. Both players need at least 4 usable completed recent matches.',
          aProfile, bProfile, h2hProfile
        };
      }

      const playerCombinedAvg = meanSafe([aProfile.last5Avg, aProfile.last10Avg, bProfile.last5Avg, bProfile.last10Avg]);
      const playerCombinedMedian = meanSafe([aProfile.median, bProfile.median]);
      const directRecentBlend =
        0.35 * safeNum(meanSafe([aProfile.last5Avg, bProfile.last5Avg]), playerCombinedAvg) +
        0.30 * safeNum(meanSafe([aProfile.last10Avg, bProfile.last10Avg]), playerCombinedAvg) +
        0.20 * playerCombinedMedian +
        0.15 * safeNum(h2hProfile.avgTotalGames, playerCombinedAvg);

      const pDecider = clamp(0.40 * aProfile.deciderRate + 0.40 * bProfile.deciderRate + 0.20 * safeNum(h2hProfile.deciderRate, meanSafe([aProfile.deciderRate, bProfile.deciderRate])), 0, 1);
      const expectedSets = 2 + pDecider;
      const combinedGamesPerSet = meanSafe([aProfile.avgGamesPerSet, bProfile.avgGamesPerSet]);
      const expectedGamesPerSet =
        0.55 * combinedGamesPerSet +
        0.25 * safeNum(h2hProfile.avgGamesPerSet, combinedGamesPerSet) +
        0.20 * (combinedGamesPerSet + 0.6 * meanSafe([aProfile.tiebreakSetRate, bProfile.tiebreakSetRate, h2hProfile.tiebreakSetRate]));

      const projectedFromParts = expectedSets * expectedGamesPerSet;
      const finalProjection = clamp(0.70 * projectedFromParts + 0.30 * directRecentBlend, 16, 40);
      const edge = round1(finalProjection - line);
      const absEdge = Math.abs(edge);
      const combinedStdev = meanSafe([aProfile.stdev, bProfile.stdev]);
      const sampleScore = clamp((aProfile.count + bProfile.count) / 20, 0, 1);
      const volatilityScore = clamp(1 - (combinedStdev / 8), 0, 1);
      const agreementScore = clamp(1 - Math.abs(projectedFromParts - directRecentBlend) / 6, 0, 1);
      const h2hSupport = h2hProfile.count >= 2 ? 0.1 : 0;
      const confidenceRaw = clamp(0.38 * sampleScore + 0.32 * volatilityScore + 0.20 * agreementScore + h2hSupport, 0, 1);

      let confidence = 'C';
      if (confidenceRaw >= 0.78) confidence = 'A';
      else if (confidenceRaw >= 0.63) confidence = 'B';
      else if (confidenceRaw < 0.48) confidence = 'NO PLAY';

      if (confidence === 'NO PLAY' || absEdge < 1.2) {
        return {
          match, line, projection: round1(finalProjection), edge, pick: 'No Play', confidence: 'NO PLAY',
          statusClass: 'err',
          statusText: absEdge < 1.2 ? 'No play. Edge is too small against the market line.' : 'No play. Sample quality and stability are not strong enough.',
          reason: absEdge < 1.2 ? 'Projection sits too close to the market line.' : 'History is too noisy or too split to trust a real pick.',
          aProfile, bProfile, h2hProfile
        };
      }

      const pick = edge > 0 ? 'Over' : 'Under';
      return {
        match, line, projection: round1(finalProjection), edge, pick, confidence,
        statusClass: 'ok',
        statusText: `Engine finished. ${pick} ${line} with confidence ${confidence}.`,
        reason: buildReason(aProfile, bProfile, h2hProfile, finalProjection, line, edge, confidence),
        aProfile, bProfile, h2hProfile
      };
    }

    function buildReason(aProfile, bProfile, h2hProfile, projection, line, edge, confidence) {
      const h2hBit = h2hProfile.count ? `H2H avg ${round1(h2hProfile.avgTotalGames)} across ${h2hProfile.count} matchups.` : 'No strong H2H support.';
      return `Projection ${round1(projection)} against line ${round1(line)} gives edge ${edge > 0 ? '+' : ''}${round1(edge)}. A/B recent last-10 averages: ${round1(aProfile.last10Avg)} / ${round1(bProfile.last10Avg)}. ${h2hBit} Confidence ${confidence}.`;
    }

    function renderResult(analysis) {
      const pickClass = analysis.pick === 'Over' ? 'pred-over' : analysis.pick === 'Under' ? 'pred-under' : 'pred-noplay';
      const confClass = analysis.confidence === 'A' ? 'conf-a' : analysis.confidence === 'B' ? 'conf-b' : analysis.confidence === 'C' ? 'conf-c' : 'conf-none';
      els.resultsBody.innerHTML = `
        <tr>
          <td>Full Match Total Games</td>
          <td>${analysis.projection !== null ? analysis.projection.toFixed(1) : '—'}</td>
          <td>${analysis.edge !== null ? (analysis.edge > 0 ? '+' : '') + analysis.edge.toFixed(1) : '—'}</td>
          <td class="${confClass}">${analysis.confidence}</td>
          <td class="${pickClass}">${analysis.pick === 'No Play' ? 'No Play' : `${analysis.pick} ${analysis.line.toFixed(1)}`}</td>
        </tr>
        <tr>
          <td colspan="5" style="text-align:left;font-weight:700;line-height:1.45;">${escapeHtml(analysis.reason)}</td>
        </tr>`;
      els.results.style.display = '';
    }

    function renderReport() {
      if (!state.runLog.length) {
        els.reportHistory.innerHTML = '<div class="report-empty">No engine runs logged yet.</div>';
        return;
      }
      els.reportHistory.innerHTML = state.runLog.slice().reverse().slice(0, 20).map(item => `
        <div class="report-card">
          <div class="report-title">${escapeHtml(item.players)} · ${escapeHtml(item.pick)} · ${escapeHtml(item.confidence)}</div>
          <div>${escapeHtml(item.tournament)} · ${escapeHtml(item.round || 'Round unknown')}</div>
          <div>Projection ${escapeHtml(item.projection)} vs line ${escapeHtml(item.line)} · edge ${escapeHtml(item.edge)}</div>
          <div class="muted-mini">${escapeHtml(item.runAt)}</div>
        </div>`).join('');
    }

    function persistRun(analysis) {
      state.runLog.push({
        id: `${analysis.match.id}_${Date.now()}`,
        players: `${analysis.match.playerA.name} vs ${analysis.match.playerB.name}`,
        tournament: analysis.match.tournament || 'ATP event',
        round: analysis.match.round || '',
        line: analysis.line.toFixed(1),
        projection: analysis.projection !== null ? analysis.projection.toFixed(1) : '—',
        edge: analysis.edge !== null ? `${analysis.edge > 0 ? '+' : ''}${analysis.edge.toFixed(1)}` : '—',
        pick: analysis.pick,
        confidence: analysis.confidence,
        runAt: new Date().toLocaleString()
      });
      state.runLog = state.runLog.slice(-100);
      localStorage.setItem(RUN_LOG_KEY, JSON.stringify(state.runLog));
    }

    async function getMatchesForDate(dateValue, forceRefresh) {
      const key = toYMD(dateValue);
      if (!forceRefresh && state.dayCache[key]) return state.dayCache[key];
      const response = await fetch(`${SCOREBOARD_BASE}?dates=${key}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status} from ESPN`);
      const data = await response.json();
      const matches = normalizeScoreboard(data);
      state.dayCache[key] = matches;
      localStorage.setItem(DAY_CACHE_KEY, JSON.stringify(state.dayCache));
      return matches;
    }

    function normalizeScoreboard(data) {
      const out = [];
      const events = Array.isArray(data && data.events) ? data.events : [];
      for (const event of events) {
        const eventName = event && (event.name || event.shortName) || 'ATP Event';
        const groupings = Array.isArray(event && event.groupings) ? event.groupings : [];
        for (const groupingEntry of groupings) {
          const competitions = Array.isArray(groupingEntry && groupingEntry.competitions) ? groupingEntry.competitions : [];
          for (const comp of competitions) {
            const competitors = Array.isArray(comp && comp.competitors) ? comp.competitors : [];
            if (competitors.length < 2) continue;
            const ordered = competitors.slice().sort((a, b) => (a && a.order || 99) - (b && b.order || 99));
            const p1 = ordered[0], p2 = ordered[1];
            const p1Scores = Array.isArray(p1 && p1.linescores) ? p1.linescores : [];
            const p2Scores = Array.isArray(p2 && p2.linescores) ? p2.linescores : [];
            const setCount = Math.max(p1Scores.length, p2Scores.length);
            const sets = [];
            for (let i = 0; i < setCount; i++) {
              const aVal = p1Scores[i] && p1Scores[i].value;
              const bVal = p2Scores[i] && p2Scores[i].value;
              if (Number.isFinite(aVal) && Number.isFinite(bVal)) sets.push({ a: Number(aVal), b: Number(bVal) });
            }
            const totalGames = sets.reduce((sum, s) => sum + s.a + s.b, 0);
            out.push({
              id: String(comp && comp.id || `${event && event.id || 'evt'}_${comp && comp.date || Math.random()}`),
              date: comp && comp.date || event && event.date || null,
              tournament: eventName,
              round: comp && comp.round && comp.round.displayName || groupingEntry && groupingEntry.grouping && groupingEntry.grouping.displayName || '',
              venue: comp && comp.venue && comp.venue.fullName || '',
              court: comp && comp.venue && comp.venue.court || '',
              statusDetail: comp && comp.status && comp.status.type && (comp.status.type.detail || comp.status.type.description) || '',
              completed: !!(comp && comp.status && comp.status.type && comp.status.type.completed),
              playerA: normalizePlayer(p1),
              playerB: normalizePlayer(p2),
              sets,
              totalGames
            });
          }
        }
      }
      return out;
    }

    function normalizePlayer(raw) {
      return {
        id: String(raw && raw.id || raw && raw.athlete && raw.athlete.id || raw && raw.athlete && raw.athlete.guid || raw && raw.uid || ''),
        name: raw && raw.athlete && (raw.athlete.displayName || raw.athlete.fullName) || 'Unknown Player',
        winner: !!(raw && raw.winner)
      };
    }

    function buildPlayerProfile(playerId, matches) {
      const usable = matches.filter(isUsableCompletedMatch).filter(m => [m.playerA.id, m.playerB.id].includes(playerId)).slice(0, 12);
      if (!usable.length) return emptyProfile();
      const totals = usable.map(m => m.totalGames);
      const last5 = totals.slice(0, 5);
      const last10 = totals.slice(0, 10);
      const totalSets = usable.reduce((sum, m) => sum + m.sets.length, 0);
      const tiebreakSets = usable.reduce((sum, m) => sum + m.sets.filter(s => (s.a === 7 && s.b === 6) || (s.a === 6 && s.b === 7)).length, 0);
      const deciders = usable.filter(m => m.sets.length === 3).length;
      const straightSets = usable.filter(m => m.sets.length === 2).length;
      return {
        count: usable.length,
        totals,
        last5Avg: meanSafe(last5),
        last10Avg: meanSafe(last10),
        median: medianSafe(totals),
        stdev: stdDevSafe(totals),
        avgGamesPerSet: totalSets ? usable.reduce((sum, m) => sum + (m.totalGames / m.sets.length), 0) / usable.length : 0,
        deciderRate: usable.length ? deciders / usable.length : 0,
        straightSetRate: usable.length ? straightSets / usable.length : 0,
        tiebreakSetRate: totalSets ? tiebreakSets / totalSets : 0
      };
    }

    function buildH2HProfile(playerAId, playerBId, matches) {
      const usable = matches.filter(isUsableCompletedMatch).filter(m => [m.playerA.id, m.playerB.id].includes(playerAId) && [m.playerA.id, m.playerB.id].includes(playerBId)).slice(0, 8);
      if (!usable.length) return emptyProfile();
      const totals = usable.map(m => m.totalGames);
      const totalSets = usable.reduce((sum, m) => sum + m.sets.length, 0);
      const tiebreakSets = usable.reduce((sum, m) => sum + m.sets.filter(s => (s.a === 7 && s.b === 6) || (s.a === 6 && s.b === 7)).length, 0);
      const deciders = usable.filter(m => m.sets.length === 3).length;
      const straightSets = usable.filter(m => m.sets.length === 2).length;
      return {
        count: usable.length,
        totals,
        avgTotalGames: meanSafe(totals),
        median: medianSafe(totals),
        stdev: stdDevSafe(totals),
        avgGamesPerSet: totalSets ? usable.reduce((sum, m) => sum + (m.totalGames / m.sets.length), 0) / usable.length : 0,
        deciderRate: usable.length ? deciders / usable.length : 0,
        straightSetRate: usable.length ? straightSets / usable.length : 0,
        tiebreakSetRate: totalSets ? tiebreakSets / totalSets : 0
      };
    }

    function emptyProfile() {
      return { count: 0, totals: [], last5Avg: 0, last10Avg: 0, avgTotalGames: 0, median: 0, stdev: 0, avgGamesPerSet: 0, deciderRate: 0, straightSetRate: 0, tiebreakSetRate: 0 };
    }

    function isUsableCompletedMatch(match) {
      if (!match || !match.completed) return false;
      if (!Array.isArray(match.sets) || !match.sets.length) return false;
      if (!Number.isFinite(match.totalGames) || match.totalGames <= 0) return false;
      return true;
    }

    function setStatus(el, message, cls) {
      el.textContent = message || '';
      el.className = '';
      if (message) el.classList.add(cls || '');
      if (el.id === 'fetchStatus') el.classList.add('status-base');
    }

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function toDateInputValue(date) {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = `${d.getMonth() + 1}`.padStart(2, '0');
      const day = `${d.getDate()}`.padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function toYMD(dateValue) { return String(dateValue).replaceAll('-', ''); }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function safeNum(v, fallback = 0) { return Number.isFinite(v) ? Number(v) : fallback; }
    function round1(v) { return Math.round((safeNum(v) + Number.EPSILON) * 10) / 10; }
    function meanSafe(arr) {
      const nums = (arr || []).map(Number).filter(Number.isFinite);
      if (!nums.length) return 0;
      return nums.reduce((a, b) => a + b, 0) / nums.length;
    }
    function medianSafe(arr) {
      const nums = (arr || []).map(Number).filter(Number.isFinite).sort((a, b) => a - b);
      if (!nums.length) return 0;
      const mid = Math.floor(nums.length / 2);
      return nums.length % 2 ? nums[mid] : (nums[mid - 1] + nums[mid]) / 2;
    }
    function stdDevSafe(arr) {
      const nums = (arr || []).map(Number).filter(Number.isFinite);
      if (nums.length < 2) return 0;
      const mean = meanSafe(nums);
      const variance = nums.reduce((sum, n) => sum + Math.pow(n - mean, 2), 0) / nums.length;
      return Math.sqrt(variance);
    }
    function pct(v) { return `${Math.round(safeNum(v) * 100)}%`; }
    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
